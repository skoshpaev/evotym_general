# TEST PROJECT ONLY: ENV VALUES AND BUILT-IN CREDENTIALS IN THIS FILE ARE COMMITTED ONLY TO KEEP THE LOCAL ORCHESTRATION STACK SELF-CONTAINED.
services:
  bootstrap-projects:
    image: docker:27.0.3-cli
    entrypoint: ["/bin/sh"]
    working_dir: "${PWD}"
    environment:
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      HOST_WORKSPACE: "${PWD}"
    volumes:
      - ${PWD}:${PWD}
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["${PWD}/scripts/bootstrap-projects.sh"]
    depends_on:
      product-mysql:
        condition: service_healthy
      order-mysql:
        condition: service_healthy

  product-app:
    image: product-app
    pull_policy: never
    working_dir: /workspace/product
    environment:
      APP_ENV: dev
      APP_DEBUG: "0"
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      API_TOKEN: "${API_TOKEN:-product-dev-token}"
      DATABASE_URL: "mysql://product:product@mysql:3306/product?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      product-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./product:/workspace/product
      - product-composer-cache:/tmp/composer-cache
    command: ["php-fpm"]
    restart: unless-stopped
    networks:
      product-internal:
        aliases:
          - app
      shared:

  product-consumer:
    image: product-app
    pull_policy: never
    working_dir: /workspace/product
    environment:
      APP_ENV: dev
      APP_DEBUG: "0"
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      API_TOKEN: "${API_TOKEN:-product-dev-token}"
      DATABASE_URL: "mysql://product:product@mysql:3306/product?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      product-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./product:/workspace/product
      - product-composer-cache:/tmp/composer-cache
    command: ["php", "bin/console", "messenger:consume", "order_created", "--time-limit=3600", "--memory-limit=128M", "--no-interaction", "-vv"]
    restart: unless-stopped
    networks:
      product-internal:
      shared:

  product-publisher:
    image: product-app
    pull_policy: never
    working_dir: /workspace/product
    environment:
      APP_ENV: dev
      APP_DEBUG: "0"
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      API_TOKEN: "${API_TOKEN:-product-dev-token}"
      DATABASE_URL: "mysql://product:product@mysql:3306/product?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      product-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./product:/workspace/product
      - product-composer-cache:/tmp/composer-cache
    command: ["sh", "-lc", "while true; do php bin/console app:publish-outbox; sleep 60; done"]
    restart: unless-stopped
    networks:
      product-internal:
      shared:

  product-nginx:
    image: nginx:1.27-alpine
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      product-app:
        condition: service_started
    entrypoint: ["/bin/sh", "-lc", "cp /workspace/product/docker/nginx/default.conf /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"]
    ports:
      - "8081:80"
    volumes:
      - ./product:/workspace/product:ro
    restart: unless-stopped
    networks:
      - product-internal

  product-mysql:
    image: mysql:8.0
    environment:
      # TEST PROJECT ONLY: THESE MYSQL CREDENTIALS ARE COMMITTED ONLY FOR LOCAL DEMO/QA CONVENIENCE.
      MYSQL_DATABASE: product
      MYSQL_USER: product
      MYSQL_PASSWORD: product
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - product-mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      product-internal:
        aliases:
          - mysql

  order-app:
    image: order-app
    pull_policy: never
    working_dir: /workspace/order
    environment:
      APP_ENV: dev
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      DATABASE_URL: "mysql://order:order@mysql:3306/order?serverVersion=8.0.36&charset=utf8mb4"
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      order-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./order:/workspace/order
      - order-composer-cache:/tmp/composer-cache
    command: ["php-fpm"]
    restart: unless-stopped
    networks:
      order-internal:
        aliases:
          - app
      shared:

  order-consumer:
    image: order-app
    pull_policy: never
    working_dir: /workspace/order
    environment:
      APP_ENV: dev
      APP_DEBUG: "0"
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      DATABASE_URL: "mysql://order:order@mysql:3306/order?serverVersion=8.0.36&charset=utf8mb4"
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      order-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./order:/workspace/order
      - order-composer-cache:/tmp/composer-cache
    command: ["php", "bin/console", "messenger:consume", "product_updated", "order_processing_status", "--time-limit=3600", "--memory-limit=128M", "--no-interaction", "-vv"]
    restart: unless-stopped
    networks:
      order-internal:
      shared:

  order-nginx:
    image: nginx:1.27-alpine
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      order-app:
        condition: service_started
    entrypoint: ["/bin/sh", "-lc", "cp /workspace/order/docker/nginx/default.conf /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"]
    ports:
      - "8082:80"
    volumes:
      - ./order:/workspace/order:ro
    restart: unless-stopped
    networks:
      - order-internal

  order-mysql:
    image: mysql:8.0
    environment:
      # TEST PROJECT ONLY: THESE MYSQL CREDENTIALS ARE COMMITTED ONLY FOR LOCAL DEMO/QA CONVENIENCE.
      MYSQL_DATABASE: order
      MYSQL_USER: order
      MYSQL_PASSWORD: order
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - order-mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      order-internal:
        aliases:
          - mysql

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - shared
    restart: unless-stopped

volumes:
  product-composer-cache:
    name: product_composer-cache
  product-mysql-data:
    name: product_mysql-data
  order-composer-cache:
    name: order_composer-cache
  order-mysql-data:
    name: order_mysql-data
  rabbitmq-data:
    name: evotym_rabbitmq-data

networks:
  shared:
    name: evotym_shared
  product-internal:
    name: evotym_product_internal
  order-internal:
    name: evotym_order_internal
