services:
  bootstrap-projects:
    image: alpine/git:2.47.1
    entrypoint: ["/bin/sh"]
    working_dir: /workspace
    environment:
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    volumes:
      - ./:/workspace
    command: ["/workspace/scripts/bootstrap-projects.sh"]

  product:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /workspace/product
    environment:
      APP_ENV: dev
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      DATABASE_URL: "mysql://product:product@product-mysql:3306/product?serverVersion=8.0&charset=utf8mb4"
      MESSENGER_TRANSPORT_DSN: "amqp://guest:guest@rabbitmq:5672/%2f/messages"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/%2f"
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      product-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - product-composer-cache:/tmp/composer-cache
    command: ["/bin/sh", "/workspace/scripts/run-project.sh", "product"]

  product-nginx:
    image: nginx:1.27-alpine
    depends_on:
      - product
    ports:
      - "8081:80"
    volumes:
      - ./:/workspace:ro
      - ./docker/nginx/product.conf:/etc/nginx/conf.d/default.conf:ro

  product-mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: product
      MYSQL_USER: product
      MYSQL_PASSWORD: product
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - product-mysql-data:/var/lib/mysql

  order:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /workspace/order
    environment:
      APP_ENV: dev
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      DATABASE_URL: "mysql://order:order@order-mysql:3306/order?serverVersion=8.0&charset=utf8mb4"
      MESSENGER_TRANSPORT_DSN: "amqp://guest:guest@rabbitmq:5672/%2f/messages"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/%2f"
    depends_on:
      bootstrap-projects:
        condition: service_completed_successfully
      order-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - order-composer-cache:/tmp/composer-cache
    command: ["/bin/sh", "/workspace/scripts/run-project.sh", "order"]

  order-nginx:
    image: nginx:1.27-alpine
    depends_on:
      - order
    ports:
      - "8082:80"
    volumes:
      - ./:/workspace:ro
      - ./docker/nginx/order.conf:/etc/nginx/conf.d/default.conf:ro

  order-mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: order
      MYSQL_USER: order
      MYSQL_PASSWORD: order
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - order-mysql-data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  product-composer-cache:
  product-mysql-data:
  order-composer-cache:
  order-mysql-data:
